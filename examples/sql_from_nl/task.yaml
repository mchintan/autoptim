name: sql_from_nl
inputs_dir: ./inputs
ground_truth: ./ground_truth.jsonl
seed_process: ./seed_process.py

metric:
  type: custom
  eval_py: ./eval.py
  aggregate: mean_score
  target: 0.85

budgets:
  max_iters: 20
  wall_clock_h: 2
  frontier_usd: 3
  per_iter_timeout_s: 180

meta:
  provider: gemini
  model: gemini-3-pro
  max_history: 5

worker:
  ollama_host: http://localhost:11434
  default_model: gemma3:4b
