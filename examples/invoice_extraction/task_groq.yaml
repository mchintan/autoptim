name: invoice_extraction_groq
inputs_dir: ./inputs
ground_truth: ./ground_truth.jsonl
seed_process: ./seed_process.py

metric:
  type: schema_match
  schema:
    invoice_no: { match: exact,    weight: 1 }
    date:       { match: date_iso, weight: 1 }
    vendor:     { match: fuzzy,    threshold: 0.80, weight: 1 }
    total:      { match: numeric,  tol: 0.01,       weight: 2 }
    currency:   { match: exact,    weight: 1 }
  aggregate: mean_score
  target: 0.90

budgets:
  max_iters: 30
  wall_clock_h: 4
  frontier_usd: 5
  per_iter_timeout_s: 300

meta:
  provider: gemini
  model: gemini-3.1-flash-lite-preview
  max_history: 5

worker:
  base_url: https://api.groq.com/openai/v1
  api_key_env: GROQ_API_KEY
  default_model: llama-3.1-8b-instant   # free + fast; swap for llama-3.3-70b-versatile for more capability
  memory_mb: 4096
