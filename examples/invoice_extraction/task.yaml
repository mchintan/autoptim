name: invoice_extraction
inputs_dir: ./inputs
ground_truth: ./ground_truth.jsonl
seed_process: ./seed_process.py

metric:
  type: schema_match
  schema:
    invoice_no: { match: exact,    weight: 1 }
    date:       { match: date_iso, weight: 1 }
    vendor:     { match: fuzzy,    threshold: 0.80, weight: 1 }
    total:      { match: numeric,  tol: 0.01,       weight: 2 }
    currency:   { match: exact,    weight: 1 }
  aggregate: mean_score
  target: 0.98   # seed with gemma-4-e4b already hits ~0.91; give the meta-agent room to fix
                  # the remaining date-format and vendor-name failures

budgets:
  max_iters: 30
  wall_clock_h: 4
  frontier_usd: 5
  per_iter_timeout_s: 300

meta:
  provider: gemini
  model: gemini-3.1-flash-lite-preview 
  max_history: 5
  # `temperature` intentionally unset. Some reasoning-class models reject it;
  # leave it off by default and only set explicitly when you know the target
  # model accepts and benefits from it.

worker:
  base_url: http://127.0.0.1:1234/v1   # LM Studio local server
  default_model: google/gemma-4-e4b    # whatever you've loaded in LM Studio
  # api_key_env: null                  # LM Studio doesn't check auth; leave unset
  memory_mb: 4096
